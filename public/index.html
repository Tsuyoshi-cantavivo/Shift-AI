<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F172A" />
  <title>ShiftAI — AIシフト自動作成</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
  <script>
    // FOUC(初回フラッシュ)防止: 描画前にテーマを決定
    (function () {
      try {
        var saved = localStorage.getItem('shiftai_theme');
        var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>

  <!-- ================= ログイン画面 ================= -->
  <div id="loginView" class="login-wrap">
    <div class="login-bg-noise"></div>
    <div class="login-glow"></div>
    <div class="card login-card">
      <div class="login-hero">
        <div class="brand-logo"><i class="bi bi-calendar2-check-fill"></i></div>
        <h3 class="mb-0">ShiftAI</h3>
        <p class="text-secondary small mb-0">AI活用型シフト自動作成</p>
      </div>
      <div class="card-body p-4">
        <div class="mb-3">
          <label class="form-label" for="loginId">ID</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="loginId" class="form-control" placeholder="IDを入力" autocomplete="username" />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label" for="loginPassword">パスワード</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="loginPassword" class="form-control" placeholder="パスワード" autocomplete="current-password" />
          </div>
          <div class="form-text">IDで自動的に店舗・スタッフ・管理者を判別します</div>
        </div>
        <button id="loginBtn" class="btn btn-primary btn-lg w-100">ログイン <i class="bi bi-arrow-right-circle ms-1"></i></button>
        <div id="loginError" class="text-danger text-center mt-3 small"></div>
      </div>
    </div>
  </div>

  <!-- ================= メインアプリ ================= -->
  <div id="appView" class="d-none">
    <header class="app-header">
      <div class="header-left">
        <button id="menuToggle" class="icon-btn d-lg-none"><i class="bi bi-list"></i></button>
        <span class="header-brand"><i class="bi bi-calendar2-check-fill"></i> ShiftAI</span>
        <span id="headerTitle" class="header-title"></span>
      </div>
      <div class="header-right">
        <button id="themeToggleBtn" class="icon-btn" title="テーマ切替" aria-label="テーマ切替"><i class="bi bi-circle-half"></i></button>
        <button id="notifBtn" class="icon-btn position-relative d-none">
          <i class="bi bi-bell"></i>
          <span id="notifBadge" class="badge-dot d-none"></span>
        </button>
        <button id="logoutBtn" class="icon-btn"><i class="bi bi-box-arrow-right"></i></button>
      </div>
    </header>

    <div class="app-shell">
      <aside id="sideNav" class="side-nav"></aside>
      <div id="sideOverlay" class="side-overlay d-lg-none"></div>
      <main id="content" class="app-content"></main>
    </div>

    <nav id="bottomNav" class="bottom-nav d-lg-none"></nav>
    <div id="toastWrap" class="toast-wrap"></div>
  </div>

  <!-- ================= 印刷/PDF専用ビュー（画面では非表示・印刷時のみ表示） ================= -->
  <div id="printView" class="print-view"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
